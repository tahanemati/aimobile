  <body>

      START LODAER PAGE
    ==================================== -->
    <section class="loader-page" id="loaderPage">

          <div class="display-title">
            <h1>حساب خود را فعال کنید!</h1>
            <p>
              لطفاً کد موقتی که به شماره شما ارسال شده است را وارد کنید
              <span class="text-dark weight-500"> 09199399573 </span>
            </p>
          </div>
          <div class="content__form margin-t-40">
            <form class="form-verification-code">
              <div class="form-group">
                <div dir="ltr" class="input_group">
                  <input
                    type="tel"
                    maxlength="1"
                    pattern="[0-9]"
                    class="form-control"
                    placeholder=""

                  <input
                    type="tel"
                    maxlength="1"
                    pattern="[0-9]"
                    class="form-control"
                    placeholder=""
                  />
                  <input
                    type="tel"

                    placeholder=""
                  />
                  <input

                    maxlength="1"

                    class="form-control"
                    placeholder=""
                  />
                  <input
                    type="tel"
                    maxlength="1"
                    pattern="[0-9]"
                    class="form-control"
                    placeholder=""
                  />
                </div>
              </div>
              <div class="countdown_code">
                <p id="countdown" class="text_count"></p>
              </div>
            </form>
          </div>
        </section>
        <footer class="footer-account">
          <div class="env-pb">
            <div class="display-actions container">
              <a
                href="index.html"
                id="submitOtpBtn"
                class="btn btn-sm-arrow bg-primary col-12"
                disabled
              >
                <p> ورود به حساب کاربری </p>
                <div class="ico"><i class="ri-arrow-drop-left-line"></i></div>
              </a>
            </div>
            <div class="dividar"></div>
            <div class="support">

                نیاز به کمک دارید؟

    ==================================== -->

      <div
        class="toast status-connection"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      ></div>
