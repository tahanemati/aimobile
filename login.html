<!doctype html>
<html lang="en" dir="rtl">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#222032"
      media="(prefers-color-scheme: dark)"
    />
    <title>پرامپتیک | ورود / ثبت نام</title>
    <meta
      name="description"
      content=" برای ورود به حساب کاربری پرامپتیک اقدام کنید "
    />
    <meta name="keywords" content="ورود" />

    <!-- FAVICON -->
    <link
      rel="icon"
      type="image/png"
      href="images/icons/icon32.png"
      sizes="32x32"
    />
    <!-- CSS FILES -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/remixicon.min.css" />
    <link rel="stylesheet" href="assets/vendors/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" href="assets/vendors/zuck_stories/zuck.min.css" />
    <link rel="manifest" href="_manifest.json" />
  </head>


  <body>
    <!-- ===================================
      START LODAER PAGE
    ==================================== -->
    <section class="loader-page" id="loaderPage">
      <div class="spinner_flash"></div>
    </section>
    <!-- START WRAPPER -->
    <div id="wrapper">
      <!-- START CONTENT -->
      <div id="content">
        <!-- ===================================
            ==================================== -->
        <!-- ===================================
            ==================================== -->
        <div class="space-sticky"></div>
        <!-- ===================================
            ==================================== -->
        <section class="account-section padding-20 container">
          <div class="display-title">
            <h1 class="margin-b-110"> شماره موبایل را وارد کنید </h1>
            <p> کد تایید به این شماره پیامک میشود. </p>
          </div>
          <div class="content__form margin-t-24">
            <form id="signinForm">
              <div class="form-group icon-left">
                <div class="input_group">
                  <input
                    type="tel"
                    id="phoneInput"
                    class="form-control form-field"
                    maxlength="11"
                    pattern="[0-9]*"
                    inputmode="numeric"
                    placeholder="شماره موبایل"
                    required
                  />
                  <div class="icon"><i class="ri-phone-line"></i></div>
                </div>
              </div>
            </form>
          </div>
        </section>
        <!-- ===================================
            ==================================== -->
        <footer class="footer-account">
          <div class="env-pb">
            <div class="display-actions container">
              <a
                href="otp.html"
                id="submitSigninBtn"
                class="btn btn-sm-arrow bg-primary col-12"
                disabled
              >
                <p class="">ورود</p>
                <div class="ico">
                  <i class="ri-arrow-drop-left-line"></i>
                </div>
              </a>
            </div>
            <div class="dividar"></div>
            <div class="support container">
              <p>
                نیاز به کمک دارید؟
                <a href="page-help.html">با تیم پشتیبانی ما تماس بگیرید</a>
              </p>
            </div>
          </div>
        </footer>
      </div>
    </div>

    <!-- ===================================
      START STATUS CONNECTION
    ==================================== -->
    <div class="d-flex justify-content-center">
      <div
        class="toast status-connection"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      ></div>
    </div>

    <!-- JS FILES -->
    <script src="assets/vendors/zuck_stories/zuck.min.js"></script>
    <script src="assets/vendors/smoothscroll/smoothscroll.min.js"></script>
    <script src="assets/vendors/swiper/swiper-bundle.min.js"></script>
    <script src="assets/vendors/nouislider/nouislider.min.js"></script>
    <script src="assets/vendors/nouislider/wNumb.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/custom.js"></script>
    <!-- PWA APP SERVICE REGISTRATION AND WORKS JS -->
    <script src="assets/js/pwa-services.js"></script>
    <script src="assets/js/Otp.js"></script>
  </body>
</html>
